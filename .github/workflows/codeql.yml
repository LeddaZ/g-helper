name: CodeQL

on:
  push:
    branches: [fork]
  schedule:
    - cron: "34 18 * * 3"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: c#
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Analyze
        uses: github/codeql-action/analyze@v4
